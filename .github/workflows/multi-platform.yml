name: C++ Multi-Platform Build

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS — Apple Clang ────────────────────────────────────────────
          - name: macOS (Apple Clang)
            os: macos-14
            cc: clang
            cxx: clang++
            artifact_name: macos-arm64
            shell: bash

          # ── Ubuntu — GCC 23 (GCC 13 + C++23 standard) ─────────────────────
          - name: Ubuntu (GCC / C++23)
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
            cxx_standard: 23
            artifact_name: linux-gcc-cxx23
            shell: bash

          # ── Windows — MSVC ─────────────────────────────────────────────────
          - name: Windows (MSVC)
            os: windows-2022
            artifact_name: windows-msvc
            use_clang_cl: false
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Cache build dependencies ──────────────────────────────────────────────
      - name: Cache CMake build deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake
            ${{ github.workspace }}/build/_deps
          key: cmake-${{ matrix.artifact_name }}-${{ hashFiles('**/CMakeLists.txt', '**/cmake/**') }}
          restore-keys: cmake-${{ matrix.artifact_name }}-

      # ── Linux: ensure GCC 13 present ─────────────────────────────────────────
      - name: Install GCC 13 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      # ── macOS: ensure Ninja present ───────────────────────────────────────────
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # ── Configure — Unix (macOS + Linux) ─────────────────────────────────────
      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ matrix.cxx_standard }}" ]; then
            EXTRA_FLAGS="-DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }}"
          fi
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            $EXTRA_FLAGS

      # ── Configure — Windows MSVC ──────────────────────────────────────────────
      - name: Configure CMake (MSVC)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      # ── Build — Unix ──────────────────────────────────────────────────────────
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      # ── Build — Windows ───────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ── Test — Unix ───────────────────────────────────────────────────────────
      - name: Test (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: ctest --output-on-failure --parallel 4

      # ── Test — Windows ────────────────────────────────────────────────────────
      - name: Test (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure --parallel 4

      # ── Upload binaries directly from build/ ──────────────────────────────────
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            build/**/*.exe
            build/**/*.dll
            build/**/*.so
            build/**/*.dylib
            build/**/bin/*
            build/**/lib/*
            !build/_deps/**
            !build/**/*.dir/**
            !build/**/*.ninja
            !build/**/*.cmake
          if-no-files-found: warn
          retention-days: 30

  # ── Release: bundle & publish on v* tags ─────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts/
          merge-multiple: false

      - name: Zip each platform
        run: |
          cd artifacts
          for dir in */; do
            platform="${dir%/}"
            zip -r "../${platform}.zip" "$dir"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}